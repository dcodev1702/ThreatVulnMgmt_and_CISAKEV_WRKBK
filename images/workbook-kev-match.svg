<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 460" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7b8aa0"/>
    </marker>
  </defs>

  <!-- Canvas -->
  <rect width="1240" height="460" fill="#0a1426"/>

  <!-- Title -->
  <text x="620" y="32" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="700">Workbook — KEV Match Logic</text>
  <text x="620" y="54" text-anchor="middle" fill="#7b8aa0" font-size="12" font-style="italic">Latest snapshot per (DeviceId, CveId) joined to latest KEV catalog snapshot per CveId</text>

  <!-- ===== Sources (purple, left column) ===== -->

  <!-- DeviceInfo -->
  <g>
    <rect x="40" y="80" width="240" height="80" rx="8" fill="#1f1535" stroke="#7c3aed" stroke-width="2"/>
    <text x="160" y="108" text-anchor="middle" fill="#c4b5fd" font-size="15" font-weight="700">DeviceInfo</text>
    <text x="160" y="128" text-anchor="middle" fill="#a78bfa" font-size="11" font-style="italic">Region filter</text>
    <text x="160" y="144" text-anchor="middle" fill="#a78bfa" font-size="11" font-style="italic">MachineGroup</text>
  </g>

  <!-- TvmRegional_CL -->
  <g>
    <rect x="40" y="190" width="240" height="80" rx="8" fill="#1f1535" stroke="#7c3aed" stroke-width="2"/>
    <text x="160" y="218" text-anchor="middle" fill="#c4b5fd" font-size="15" font-weight="700">TvmRegional_CL</text>
    <text x="160" y="238" text-anchor="middle" fill="#a78bfa" font-size="11" font-style="italic">arg_max(TimeGenerated, *)</text>
    <text x="160" y="254" text-anchor="middle" fill="#a78bfa" font-size="11" font-style="italic">by DeviceId, CveId</text>
  </g>

  <!-- CisaKev_CL -->
  <g>
    <rect x="40" y="320" width="240" height="80" rx="8" fill="#1f1535" stroke="#7c3aed" stroke-width="2"/>
    <text x="160" y="348" text-anchor="middle" fill="#c4b5fd" font-size="15" font-weight="700">CisaKev_CL</text>
    <text x="160" y="368" text-anchor="middle" fill="#a78bfa" font-size="11" font-style="italic">arg_max(TimeGenerated, *)</text>
    <text x="160" y="384" text-anchor="middle" fill="#a78bfa" font-size="11" font-style="italic">by CveId</text>
  </g>

  <!-- ===== Join 1 (coral) ===== -->
  <g>
    <rect x="400" y="120" width="220" height="80" rx="8" fill="#2a1612" stroke="#d97706" stroke-width="2"/>
    <text x="510" y="148" text-anchor="middle" fill="#fbbf24" font-size="14" font-weight="700">join kind=inner</text>
    <text x="510" y="168" text-anchor="middle" fill="#d4a060" font-size="12" font-style="italic">on DeviceId</text>
    <text x="510" y="186" text-anchor="middle" fill="#d4a060" font-size="10">restricts TVM rows to selected region</text>
  </g>

  <!-- ===== Join 2 (coral) ===== -->
  <g>
    <rect x="740" y="240" width="220" height="80" rx="8" fill="#2a1612" stroke="#d97706" stroke-width="2"/>
    <text x="850" y="268" text-anchor="middle" fill="#fbbf24" font-size="14" font-weight="700">join kind=inner</text>
    <text x="850" y="288" text-anchor="middle" fill="#d4a060" font-size="12" font-style="italic">on CveId</text>
    <text x="850" y="306" text-anchor="middle" fill="#d4a060" font-size="10">keeps only KEV-listed CVEs</text>
  </g>

  <!-- ===== Output grid (red/coral, larger) ===== -->
  <g>
    <rect x="1010" y="220" width="200" height="120" rx="8" fill="#2a1414" stroke="#dc2626" stroke-width="2"/>
    <text x="1110" y="248" text-anchor="middle" fill="#fca5a5" font-size="14" font-weight="700">KEV-matched</text>
    <text x="1110" y="266" text-anchor="middle" fill="#fca5a5" font-size="14" font-weight="700">grid</text>
    <text x="1110" y="290" text-anchor="middle" fill="#fecaca" font-size="10" font-style="italic">Device · CVE · KEV Name</text>
    <text x="1110" y="306" text-anchor="middle" fill="#fecaca" font-size="10" font-style="italic">Vendor · Ransomware</text>
    <text x="1110" y="322" text-anchor="middle" fill="#fecaca" font-size="10" font-style="italic">CISA Due · Severity</text>
  </g>

  <!-- ===== Arrows ===== -->

  <!-- DeviceInfo -> Join1 (top input) -->
  <path d="M 280 120 L 340 120 L 340 145 L 400 145" stroke="#7b8aa0" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- TvmRegional_CL -> Join1 (bottom input) -->
  <path d="M 280 230 L 340 230 L 340 175 L 400 175" stroke="#7b8aa0" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Join1 -> Join2 (top input) -->
  <path d="M 620 160 L 680 160 L 680 265 L 740 265" stroke="#7b8aa0" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- CisaKev_CL -> Join2 (bottom input, routes far right then up) -->
  <path d="M 280 360 L 710 360 L 710 295 L 740 295" stroke="#7b8aa0" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Join2 -> Output -->
  <path d="M 960 280 L 1010 280" stroke="#7b8aa0" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- ===== Live validation footnote ===== -->
  <g>
    <rect x="40" y="420" width="1160" height="28" rx="6" fill="none" stroke="#3b4863" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="620" y="439" text-anchor="middle" fill="#9ca3af" font-size="11" font-style="italic">Live validation: 19 KEV matches across 6 hosts · 14 unique KEV CVEs · 6 already past CISA due date</text>
  </g>

</svg>
